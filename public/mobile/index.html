<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#06070d" />
    <title>MultiTerminalAI Remote</title>
    <link rel="manifest" href="/mobile/manifest.json" />
    <link rel="stylesheet" href="/vendor/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/mobile/styles.css" />
  </head>
  <body>
    <!-- ========== CONNECTIONS MANAGER ========== -->
    <main id="connectionsView" class="screen connections-screen" hidden>
      <header class="mobile-header">
        <h1>Conexiones</h1>
      </header>
      <div class="conn-header">
        <p>Tus servidores MultiTerminalAI. Toca uno para conectar.</p>
      </div>
      <div id="connList" class="conn-list"></div>
      <button id="connAddButton" class="conn-add-button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Agregar conexion
      </button>
    </main>

    <!-- ========== PAIR SCREEN ========== -->
    <main id="pairView" class="screen pair-screen" hidden>
      <div class="pair-logo">
        <svg viewBox="0 0 108 108" fill="none" class="pair-logo-svg">
          <rect x="14" y="22" width="80" height="56" rx="8" fill="#0F172A" stroke="#22D3EE" stroke-width="2.5"/>
          <rect x="14" y="22" width="80" height="12" rx="8" fill="#1E293B"/>
          <circle cx="22" cy="28" r="2" fill="#F56B7A"/><circle cx="28" cy="28" r="2" fill="#F5BF4A"/><circle cx="34" cy="28" r="2" fill="#3CCF91"/>
          <text x="22" y="58" fill="#3CCF91" font-family="monospace" font-size="11" font-weight="bold">$</text>
          <text x="32" y="58" fill="#22D3EE" font-family="monospace" font-size="10">codex</text>
          <rect x="56" y="48" width="30" height="22" rx="4" fill="#1E293B" stroke="#A055F7" stroke-width="1.5"/>
          <text x="62" y="62" fill="#A78BFA" font-family="sans-serif" font-size="10" font-weight="bold">AI</text>
        </svg>
      </div>
      <h1>Conectar teléfono</h1>
      <p class="pair-hint">Usa Tailscale y acepta la solicitud desde el ordenador.</p>
      <label>Nombre del teléfono<input id="deviceName" autocomplete="name" /></label>
      <label>Código<input id="pairCode" autocomplete="one-time-code" /></label>
      <button id="pairButton">Solicitar acceso</button>
      <p id="pairStatus" class="status"></p>
    </main>

    <!-- ========== HOME SCREEN ========== -->
    <main id="homeView" class="screen home-screen" hidden>
      <header class="mobile-header">
        <button id="backButton" class="round round-sm" title="Conexiones">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1>Remote</h1>
        <div style="width:42px"></div>
      </header>

      <div class="computer-card">
        <div class="computer-pulse"></div>
        <div class="computer-info">
          <span class="computer-label">Conectado a</span>
          <strong id="computerName">PC</strong>
        </div>
        <svg class="computer-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>

      <div id="projectList" class="project-list"></div>
    </main>

    <!-- ========== TERMINAL SCREEN ========== -->
    <main id="terminalView" class="screen terminal-screen" hidden>
      <header class="mobile-header terminal-header" id="terminalHeader">
        <button id="terminalBack" class="round round-sm" title="Volver">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="terminal-title">
          <h1 id="terminalTitle">Chat</h1>
          <p id="terminalSubtitle"></p>
        </div>
        <button id="terminalPaste" class="round round-sm" title="Pegar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        </button>
        <button id="terminalMore" class="round round-sm" title="Mas">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
      </header>

      <div id="terminalMenu" class="terminal-menu" hidden>
        <button type="button" data-action="restart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Reiniciar</button>
        <button type="button" data-action="disconnect"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg> Desconectar</button>
        <button type="button" data-action="close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9l6 6M15 9l-6 6"/></svg> Cerrar</button>
        <button type="button" data-action="urlscan"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> URLs</button>
        <button type="button" data-action="copySelection"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copiar</button>
        <button type="button" data-action="paste"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg> Pegar</button>
      </div>

      <div id="mobileTerminal" class="mobile-terminal"></div>

      <div id="keyBar" class="key-bar">
        <button type="button" class="key toggle" id="ctrlKey" title="Ctrl">Ctrl</button>
        <button type="button" class="key" data-seq="\x1b" title="Esc">Esc</button>
        <button type="button" class="key" data-seq="\t" title="Tab">Tab</button>
        <button type="button" class="key" data-seq="\x1b[A" title="Arriba"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
        <button type="button" class="key" data-seq="\x1b[B" title="Abajo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M19 12l-7 7-7-7"/></svg></button>
        <button type="button" class="key" data-seq="\x1b[D" title="Izquierda"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
        <button type="button" class="key" data-seq="\x1b[C" title="Derecha"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
      </div>
    </main>

    <script src="/vendor/@xterm/xterm/lib/xterm.js"></script>
    <script src="/vendor/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="/mobile/app.js"></script>
  </body>
</html>
